openapi: 3.0.3
info:
  title: SCYG Blog Content API
  version: 1.0.0
  description: "SCYG 博客内容 API，提供公开读取和受授权保护的写入。"
servers:
  - url: /
tags:
  - name: Articles
    description: "文章读取与维护。"
  - name: ArticleTypes
    description: "文章类型查询与维护。"
  - name: Tags
    description: "标签查询与维护。"
  - name: ArticleImages
    description: "文章正文图片上传、取消与媒体读取。"
paths:
  /api/v1/articles:
    get:
      operationId: listArticles
      tags: [Articles]
      summary: "查询已发布文章"
      description: "分页返回状态为 `2`（已发布）且未删除的文章，可按文章类型、标签和关键词筛选。"
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/ArticleTypeFilter'
        - $ref: '#/components/parameters/TagFilter'
        - $ref: '#/components/parameters/SearchFilter'
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createArticle
      tags: [Articles]
      summary: "创建文章"
      description: "创建文章并返回资源、规范地址和强实体标签。"
      requestBody:
        description: "创建文章所需的 JSON 数据。"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreate'
            example: {title: 示例文章, slug: sample-article, digest: 示例摘要, content: 示例正文, article_type_id: 1, tag_ids: [1], status: 1}
      responses:
        '201':
          description: "创建成功，返回当前资源、`Location` 和 `ETag`。"
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/articles/{article_id}:
    parameters:
      - $ref: '#/components/parameters/ArticleID'
    get:
      operationId: getArticle
      tags: [Articles]
      summary: "获取已发布文章"
      description: "仅在文章状态为 `2`（已发布）且未删除时返回。"
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      operationId: patchArticle
      tags: [Articles]
      summary: "更新文章"
      description: "更新请求中提供的字段，`If-Match` 必须与当前版本一致。"
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        description: "更新文章所需的 JSON 数据。"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticlePatch'
            example: {title: 更新后的标题}
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteArticle
      tags: [Articles]
      summary: "删除文章"
      description: "删除文章，`If-Match` 必须与当前版本一致。"
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: "删除成功，不返回响应体。"
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/article-types:
    get:
      operationId: listArticleTypes
      tags: [ArticleTypes]
      summary: "查询文章类型"
      description: "分页返回未删除的文章类型，可按关键词筛选。"
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SearchFilter'
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleTypeList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createArticleType
      tags: [ArticleTypes]
      summary: "创建文章类型"
      description: "创建文章类型并返回资源、规范地址和强实体标签。"
      requestBody:
        description: "创建文章类型所需的 JSON 数据。"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleTypeCreate'
            example: {name: 技术, image: null, meun: 0}
      responses:
        '201':
          description: "创建成功，返回当前资源、`Location` 和 `ETag`。"
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/article-types/{article_type_id}:
    parameters:
      - $ref: '#/components/parameters/ArticleTypeID'
    get:
      operationId: getArticleType
      tags: [ArticleTypes]
      summary: "获取文章类型"
      description: "按正整数标识返回未删除的文章类型。"
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleType'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      operationId: patchArticleType
      tags: [ArticleTypes]
      summary: "更新文章类型"
      description: "更新请求中提供的字段，`If-Match` 必须与当前版本一致。"
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        description: "更新文章类型所需的 JSON 数据。"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleTypePatch'
            example: {name: 后端}
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteArticleType
      tags: [ArticleTypes]
      summary: "删除文章类型"
      description: "删除未被引用的文章类型，`If-Match` 必须与当前版本一致。"
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: "删除成功，不返回响应体。"
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tags:
    get:
      operationId: listTags
      tags: [Tags]
      summary: "查询标签"
      description: "分页返回未删除的标签，可按关键词筛选。"
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SearchFilter'
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createTag
      tags: [Tags]
      summary: "创建标签"
      description: "创建标签并返回资源、规范地址和强实体标签。"
      requestBody:
        description: "创建标签所需的 JSON 数据。"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
            example: {name: Go}
      responses:
        '201':
          description: "创建成功，返回当前资源、`Location` 和 `ETag`。"
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tags/{tag_id}:
    parameters:
      - $ref: '#/components/parameters/TagID'
    get:
      operationId: getTag
      tags: [Tags]
      summary: "获取标签"
      description: "按正整数标识返回未删除的标签。"
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      operationId: patchTag
      tags: [Tags]
      summary: "更新标签"
      description: "更新请求中提供的字段，`If-Match` 必须与当前版本一致。"
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        description: "更新标签所需的 JSON 数据。"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagPatch'
            example: {name: Golang}
      responses:
        '200':
          description: "请求成功，返回当前资源或分页响应。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteTag
      tags: [Tags]
      summary: "删除标签"
      description: "删除未被引用的标签，`If-Match` 必须与当前版本一致。"
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: "删除成功，不返回响应体。"
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/article-images:
    post:
      operationId: createArticleImage
      tags: [ArticleImages]
      summary: "上传正文图片"
      description: "上传单个 JPEG 或 PNG 正文图片，创建有效期内待提交的图片资源。请求只能包含名为 `file` 的必填文件；重复或未知 part 由处理器拒绝。"
      requestBody:
        description: "只包含一个必填二进制 `file` 的 multipart 表单，文件上限为 5 MiB。"
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file]
              properties:
                file:
                  description: "JPEG 或 PNG 图片二进制，最大 5 MiB；媒体类型和图像内容由服务端校验。"
                  type: string
                  format: binary
                  maxLength: 5242880
      responses:
        '201':
          description: "上传成功，返回待提交图片及其规范资源地址。"
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleImage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/article-images/{image_id}:
    parameters:
      - $ref: '#/components/parameters/ArticleImageID'
    delete:
      operationId: deleteArticleImage
      tags: [ArticleImages]
      summary: "取消正文图片"
      description: "按图片标识取消当前作者尚未提交的正文图片；已提交或当前状态不允许取消时返回冲突。"
      responses:
        '204':
          description: "取消成功，不返回响应体。"
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /media/article-images/{storage_key}:
    parameters:
      - $ref: '#/components/parameters/ArticleImageStorageKey'
    get:
      operationId: getArticleImageMedia
      tags: [ArticleImages]
      summary: "读取正文图片媒体"
      description: "按受控存储键读取 JPEG 或 PNG 二进制；实体标签未变化时返回 304。"
      responses:
        '200':
          description: "读取成功，返回原始图片二进制。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            image/jpeg:
              schema:
                description: "JPEG 图片二进制。"
                type: string
                format: binary
            image/png:
              schema:
                description: "PNG 图片二进制。"
                type: string
                format: binary
        '304':
          description: "实体标签未变化，不返回响应体。"
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    ArticleImageID:
      description: "32 位小写十六进制正文图片标识。"
      name: image_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ArticleImageID'
    ArticleImageStorageKey:
      description: "32 位小写十六进制正文图片键及 `.jpg` 或 `.png` 扩展名。"
      name: storage_key
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ArticleImageStorageKey'
    ArticleID:
      description: "文章正整数标识。"
      name: article_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PositiveID'
    ArticleTypeID:
      description: "文章类型正整数标识。"
      name: article_type_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PositiveID'
    TagID:
      description: "标签正整数标识。"
      name: tag_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PositiveID'
    IfMatch:
      description: "强实体标签，内容为当前正整数版本，必须原样提交，例如 `\"1\"`。"
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
        example: '"1"'
    Page:
      description: "从 `1` 开始的页码，默认 `1`。"
      name: page
      in: query
      schema:
        type: integer
        format: int32
        default: 1
        minimum: 1
    PageSize:
      description: "每页数量，默认 `20`，范围 `1` 至 `100`。"
      name: page_size
      in: query
      schema:
        type: integer
        format: int32
        default: 20
        minimum: 1
        maximum: 100
    Sort:
      description: "排序：`created_at` 创建时间升序，`-created_at` 降序，`updated_at` 更新时间升序，`-updated_at` 降序，`title` 标题升序，`-title` 降序。"
      name: sort
      in: query
      schema:
        description: "`created_at` 创建时间升序，`-created_at` 创建时间降序，`updated_at` 更新时间升序，`-updated_at` 更新时间降序，`title` 标题升序，`-title` 标题降序。"
        type: string
        default: -created_at
        enum: [created_at, -created_at, updated_at, -updated_at, title, -title]
        example: -created_at
    ArticleTypeFilter:
      description: "按文章类型标识筛选文章，例如 `1`。"
      name: article_type_id
      in: query
      schema:
        $ref: '#/components/schemas/PositiveID'
    TagFilter:
      description: "按标签标识筛选文章，例如 `1`。"
      name: tag_id
      in: query
      schema:
        $ref: '#/components/schemas/PositiveID'
    SearchFilter:
      description: "按关键词筛选可搜索文本，例如 `Go`。"
      name: q
      in: query
      schema:
        type: string
        minLength: 1
        maxLength: 200
        example: Go
  headers:
    ETag:
      description: "强实体标签，内容为当前正整数版本，例如 `\"1\"`。"
      required: true
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
        example: '"1"'
    Location:
      description: "新资源规范 URI，例如 `/api/v1/articles/1`。"
      required: true
      schema:
        type: string
        format: uri-reference
  responses:
    BadRequest:
      description: "HTTP `400`，请求参数或请求体校验失败。"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: "HTTP `403`，写操作授权被拒绝。"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: "HTTP `404`，资源不存在或不可公开访问。"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: "HTTP `409`，唯一性或业务前置条件冲突。"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PreconditionFailed:
      description: "HTTP `412`，`If-Match` 已过期，与当前版本不一致。"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PreconditionRequired:
      description: "HTTP `428`，缺少 `If-Match` 请求头。"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalError:
      description: "HTTP `500`，服务发生未处理错误。"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    ArticleImageID:
      description: "正文图片标识，固定为 32 位小写十六进制字符串。"
      type: string
      minLength: 32
      maxLength: 32
      pattern: '^[0-9a-f]{32}$'
      example: 0123456789abcdef0123456789abcdef
    ArticleImageStorageKey:
      description: "受控存储键，由 32 位小写十六进制字符串和 `.jpg` 或 `.png` 扩展名组成。"
      type: string
      minLength: 36
      maxLength: 36
      pattern: '^[0-9a-f]{32}\.(?:jpg|png)$'
      example: 0123456789abcdef0123456789abcdef.jpg
    ArticleImageMediaType:
