version: '3'

vars:
  BINARY: api
  MODULE: github.com/PengYuee/SCYG.Blog/backend
  GO_VERSION: 1.25.0
  GO_IMAGE: golang:1.25.0-bookworm@sha256:81dc45d05a7444ead8c92a389621fafabc8e40f8fd1a19d7e5df14e61e98bc1a
  POSTGRES_IMAGE: postgres:17.5@sha256:aadf2c0696f5ef357aa7a68da995137f0cf17bad0bf6e1f17de06ae5c769b302
  TASK_VERSION: v3.49.1
  GOFUMPT_CMD: go run mvdan.cc/gofumpt@v0.10.0
  GOIMPORTS_CMD: go run golang.org/x/tools/cmd/goimports@v0.48.0
  GOLANGCI_LINT_CMD: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
  NILAWAY_CMD: go run go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260710181136-2378218750e4
  GOVULNCHECK_CMD: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0
  OPENAPI_LINT_CMD: go run github.com/daveshanley/vacuum@v0.29.0
  OAPI_CODEGEN_CMD: go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.2
  MIGRATE_CMD: go run github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.0
  IMAGE: scyg-blog-backend:ci
  PLAN_PATH: '{{default "../.omo/plans/go-service-architecture-foundation.md" .PLAN_PATH}}'
  EVIDENCE_ROOT: '{{default "../.omo/evidence" .EVIDENCE_ROOT}}'

tasks:
  default:
    desc: Run the current backend quality gate
    cmds:
      - task: ci

  task:version:check:
    desc: Require the pinned Task runner version
    cmds:
      - cmd: >-
          powershell.exe -NoProfile -Command
          "if ((task --version).Trim() -ne '{{trimPrefix "v" .TASK_VERSION}}') { Write-Error '必须使用 Task {{.TASK_VERSION}}'; exit 1 }"
        platforms: [windows]
      - cmd: >-
          sh -c 'test "$(task --version)" = "{{trimPrefix "v" .TASK_VERSION}}"'
        platforms: [linux, darwin]

  format:
    desc: Format all Go source files
    cmds:
      - '{{.GOFUMPT_CMD}} -w .'
      - '{{.GOIMPORTS_CMD}} -w -local {{.MODULE}} .'

  fmt:check:
    desc: Reject Go formatting drift without modifying files
    cmds:
      - cmd: >-
          powershell.exe -NoProfile -Command
          "\$files = @({{.GOFUMPT_CMD}} -l .); if (\$files.Count -gt 0) { \$files | ForEach-Object { Write-Output \$_ }; exit 1 }"
        platforms: [windows]
      - cmd: >-
          sh -c 'files="$({{.GOFUMPT_CMD}} -l .)"; if [ -n "\$files" ]; then printf "%s\n" "\$files"; exit 1; fi'
        platforms: [linux, darwin]

  lint:
    desc: Run pinned static analyzers outside the runtime module graph
    cmds:
      - '{{.GOLANGCI_LINT_CMD}} run ./...'
      - '{{.NILAWAY_CMD}} -include-pkgs={{.MODULE}}/... ./...'

  unit:
    desc: Run uncached race-enabled unit tests
    cmds:
      - go test -race -shuffle=on -count=1 ./...

  integration:
    desc: Run integration-tagged tests
    cmds:
      - go test -tags=integration -race -shuffle=on -count=1 ./...

  e2e:
    desc: Run end-to-end-tagged tests
    cmds:
      - go test -tags=e2e -race -shuffle=on -count=1 ./...

  generate:
    desc: Regenerate all committed source artifacts
    cmds:
      - task: api:generate

  build:
    desc: Build the API binary
    cmds:
      - go build -trimpath -o bin/{{.BINARY}}{{exeExt}} ./cmd/api

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  mod:verify:
    desc: Verify downloaded module content
    cmds:
      - go mod verify

  vuln:
    desc: Scan packages with pinned govulncheck
    cmds:
      - '{{.GOVULNCHECK_CMD}} ./...'

  api:lint:
    desc: Lint the authoritative OpenAPI contract
    cmds:
      - '{{.OPENAPI_LINT_CMD}} lint api/openapi.yaml'

  api:generate:
    desc: Generate OpenAPI Gin interfaces and transport models
    cmds:
      - '{{.OAPI_CODEGEN_CMD}} --config oapi-codegen.yaml api/openapi.yaml'

  api:docs:sync:
    desc: Synchronize the API docs copy from the authoritative specification
    cmds:
      - go run ./internal/docsync

  api:docs:check:
    desc: Reject API documentation specification drift
    cmds:
      - go run ./internal/docsync --check
  api:generate:check:
    desc: Reject OpenAPI generation drift without modifying committed output
    cmds:
      - cmd: go build -trimpath -o bin/generationcheck.exe ./internal/generationcheck
        platforms: [windows]
      - cmd: bin/generationcheck.exe
        platforms: [windows]
      - cmd: go run ./internal/generationcheck
        platforms: [linux, darwin]

  migrate:version:
    desc: Print the pinned migration CLI version
    cmds:
      - '{{.MIGRATE_CMD}} -version'

  tools:versions:
    desc: Print pinned tool versions
    cmds:
      - go version
      - task --version
      - '{{.GOFUMPT_CMD}} -version'
      - '{{.GOLANGCI_LINT_CMD}} version'
      - '{{.NILAWAY_CMD}} -V'
      - '{{.GOVULNCHECK_CMD}} -version'
      - '{{.OPENAPI_LINT_CMD}} version'
      - '{{.OAPI_CODEGEN_CMD}} -version'

  generate:freshness:
    desc: Regenerate committed artifacts and reject Git drift
    cmds:
      - task: generate
      - task: api:docs:sync
      - git diff --exit-code -- .

  migrate:up:
    desc: Apply all embedded migrations using SCYG_DATABASE_DSN
    cmds:
      - go run ./cmd/migrate up

  migrate:down:
    desc: Roll back all embedded migrations using SCYG_DATABASE_DSN
    cmds:
      - go run ./cmd/migrate down

  migrate:roundtrip:
    desc: Prove migration up, down, up and final clean version
    cmds:
      - task: migrate:up
      - task: migrate:down
      - task: migrate:up
      - go run ./cmd/migrate version

  container:build:
    desc: Build the pinned API image
    cmds:
      - docker build --pull=false --tag {{.IMAGE}} .

  compose:smoke:
    desc: Start Compose and wait for PostgreSQL and API healthchecks
    cmds:
      - docker compose up --detach --wait --wait-timeout 120
      - cmd: >-
          powershell.exe -NoProfile -Command "Invoke-WebRequest -UseBasicParsing http://127.0.0.1:${SCYG_API_PORT:-8080}/live | Out-Null; Invoke-WebRequest -UseBasicParsing http://127.0.0.1:${SCYG_API_PORT:-8080}/ready | Out-Null"
        platforms: [windows]
      - cmd: >-
          sh -c 'curl --fail --silent --show-error http://127.0.0.1:${SCYG_API_PORT:-8080}/live >/dev/null && curl --fail --silent --show-error http://127.0.0.1:${SCYG_API_PORT:-8080}/ready >/dev/null'
        platforms: [linux, darwin]

  compose:down:
    desc: Stop Compose and remove its anonymous resources
    cmds:
      - docker compose down --remove-orphans

  qa:static:
    desc: Run the bounded backend quality and delivery configuration gates
    cmds:
      - task: task:version:check
      - task: fmt:check
      - task: mod:verify
      - task: api:lint
      - task: api:generate:check
      - task: api:docs:check
      - go test ./internal/contracttest ./internal/deliverytest -count=1
      - task: vet
      - task: lint
      - task: unit
      - task: build
      - task: vuln

  qa:database:
    desc: Run migration, integration and E2E gates against configured PostgreSQL
    cmds:
      - task: migrate:roundtrip
      - task: integration
      - task: e2e

  qa:container:
    desc: Run image build and Compose health smoke gates
    cmds:
      - task: container:build
      - task: compose:smoke
      - defer: task compose:down

  ci:
    desc: Run the local backend quality gate shared with CI
    cmds:
      - task: qa:static
  qa:plan:
    env:
      PLAN_PATH: '{{.PLAN_PATH}}'
      EVIDENCE_ROOT: '{{.EVIDENCE_ROOT}}'
    desc: Audit plan, evidence, history-facing handoff surfaces and final targets
    cmds:
      - cmd: >-
          powershell.exe -NoProfile -Command
          "$env:PLAN_PATH = (Resolve-Path -LiteralPath '{{.PLAN_PATH}}').Path; $env:EVIDENCE_ROOT = (Resolve-Path -LiteralPath '{{.EVIDENCE_ROOT}}').Path; go test -timeout 30s ./internal/reviewtest -run 'Test_PlanCompliance_' -count=1"
        platforms: [windows]
      - cmd: >-
          PLAN_PATH="$(realpath '{{.PLAN_PATH}}')" EVIDENCE_ROOT="$(realpath '{{.EVIDENCE_ROOT}}')" go test -timeout 30s ./internal/reviewtest -run 'Test_PlanCompliance_' -count=1
        platforms: [linux, darwin]
      - git log --format=%s --all
      - git ls-tree -r --name-only HEAD
      - cmd: |
          echo 'F1 plan compliance: PASS'

  qa:quality:
    desc: Run bounded static gates and encoded manual review assertions
    cmds:
      - task: qa:static
      - go test -timeout 30s ./internal/reviewtest ./internal/architecture ./internal/deliverytest -count=1
      - cmd: |
          echo 'F2 quality: PASS'

  qa:scope:
    desc: Reject excluded runtime scope while allowing future design documentation
    cmds:
      - go test -timeout 30s ./internal/reviewtest -run 'Test_Scope' -count=1
      - cmd: |
          echo 'F4 scope: PASS'

  qa:foundation:
    desc: Run real PostgreSQL, API, Compose, fault, restart and shutdown narratives
    cmds:
      - task: qa:database
      - task: qa:container
      - cmd: |
          echo 'foundation QA: PASS'
      - cmd: |
          echo 'F3 real system: PASS'
