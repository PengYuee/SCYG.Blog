version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - exhaustive
    - fatcontext
    - gocognit
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nilnil
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocognit:
      min-complexity: 25
    gocyclo:
      min-complexity: 15
    govet:
      enable-all: true
      settings:
        shadow:
          strict: true
    revive:
      rules:
        - name: exported
        - name: package-comments
        - name: var-naming
    sloglint:
      attr-only: true
      context: scope
      key-naming-case: snake
      no-global: all
      no-mixed-args: true
      no-raw-keys: true
      static-msg: true

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/PengYuee/SCYG.Blog/backend

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
