openapi: 3.0.3
info:
  title: SCYG Blog Content API
  version: 1.0.0
  description: REST contracts for public content reads and authorizer-gated content writes.
servers:
  - url: /
tags:
  - name: Articles
  - name: ArticleTypes
  - name: Tags
paths:
  /api/v1/articles:
    get:
      operationId: listArticles
      tags: [Articles]
      summary: List published articles
      description: Returns only Published (2), nondeleted articles.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/ArticleTypeFilter'
        - $ref: '#/components/parameters/TagFilter'
        - $ref: '#/components/parameters/SearchFilter'
      responses:
        '200':
          description: Published articles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createArticle
      tags: [Articles]
      summary: Create an article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreate'
      responses:
        '201':
          description: Article created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/articles/{article_id}:
    parameters:
      - $ref: '#/components/parameters/ArticleID'
    get:
      operationId: getArticle
      tags: [Articles]
      summary: Get a published article
      description: Returns the article only when it is Published (2) and nondeleted.
      responses:
        '200':
          description: Published article
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      operationId: patchArticle
      tags: [Articles]
      summary: Patch an article
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticlePatch'
      responses:
        '200':
          description: Article updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteArticle
      tags: [Articles]
      summary: Delete an article
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Article deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/article-types:
    get:
      operationId: listArticleTypes
      tags: [ArticleTypes]
      summary: List nondeleted article types
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SearchFilter'
      responses:
        '200':
          description: Article types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleTypeList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createArticleType
      tags: [ArticleTypes]
      summary: Create an article type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleTypeCreate'
      responses:
        '201':
          description: Article type created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/article-types/{article_type_id}:
    parameters:
      - $ref: '#/components/parameters/ArticleTypeID'
    get:
      operationId: getArticleType
      tags: [ArticleTypes]
      summary: Get a nondeleted article type
      responses:
        '200':
          description: Article type
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleType'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      operationId: patchArticleType
      tags: [ArticleTypes]
      summary: Patch an article type
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleTypePatch'
      responses:
        '200':
          description: Article type updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteArticleType
      tags: [ArticleTypes]
      summary: Delete an unreferenced article type
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Article type deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tags:
    get:
      operationId: listTags
      tags: [Tags]
      summary: List nondeleted tags
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SearchFilter'
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createTag
      tags: [Tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '201':
          description: Tag created
          headers:
            Location:
              $ref: '#/components/headers/Location'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tags/{tag_id}:
    parameters:
      - $ref: '#/components/parameters/TagID'
    get:
      operationId: getTag
      tags: [Tags]
      summary: Get a nondeleted tag
      responses:
        '200':
          description: Tag
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      operationId: patchTag
      tags: [Tags]
      summary: Patch a tag
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagPatch'
      responses:
        '200':
          description: Tag updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteTag
      tags: [Tags]
      summary: Delete an unreferenced tag
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Tag deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    ArticleID:
      name: article_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PositiveID'
    ArticleTypeID:
      name: article_type_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PositiveID'
    TagID:
      name: tag_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PositiveID'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Strong entity tag containing the current positive Version.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
        example: '"1"'
    Page:
      name: page
      in: query
      schema:
        type: integer
        format: int32
        default: 1
        minimum: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        format: int32
        default: 20
        minimum: 1
        maximum: 100
    Sort:
      name: sort
      in: query
      schema:
        type: string
        default: -created_at
        enum: [created_at, -created_at, updated_at, -updated_at, title, -title]
    ArticleTypeFilter:
      name: article_type_id
      in: query
      schema:
        $ref: '#/components/schemas/PositiveID'
    TagFilter:
      name: tag_id
      in: query
      schema:
        $ref: '#/components/schemas/PositiveID'
    SearchFilter:
      name: q
      in: query
      schema:
        type: string
        minLength: 1
        maxLength: 200
  headers:
    ETag:
      description: Strong entity tag containing a positive Version.
      required: true
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
        example: '"1"'
    Location:
      description: Canonical resource URI.
      required: true
      schema:
        type: string
        format: uri-reference
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Write authorization denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found or not publicly visible
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Unique or business precondition conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PreconditionFailed:
      description: If-Match is stale
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PreconditionRequired:
      description: If-Match is missing
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalError:
      description: Unhandled internal failure
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    PositiveID:
      type: integer
      format: int64
      minimum: 1
    Version:
      type: integer
      format: int64
      minimum: 1
    ArticleStatus:
      type: integer
      format: int32
      description: Draft=1, Published=2, Archived=3.
      enum: [1, 2, 3]
      x-enum-varnames: [Draft, Published, Archived]
    PageInfo:
      type: object
      additionalProperties: false
      required: [number, size, total_items, total_pages]
      properties:
        number:
          type: integer
          format: int32
          minimum: 1
        size:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        total_items:
          type: integer
          format: int64
          minimum: 0
        total_pages:
          type: integer
          format: int64
          minimum: 0
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, instance, request_id, errors]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
          minLength: 1
        status:
          type: integer
          format: int32
          minimum: 400
          maximum: 599
        detail:
          type: string
          minLength: 1
        instance:
          type: string
          format: uri-reference
        request_id:
          type: string
          minLength: 1
        errors:
          type: object
          description: Field-specific validation details; empty for non-validation problems.
          additionalProperties:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
    Article:
      type: object
      additionalProperties: false
      required: [id, title, slug, digest, content, article_type_id, tag_ids, status, support, comment, visited, version, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/PositiveID'
        title:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          minLength: 1
          maxLength: 160
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        digest:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
          minLength: 1
        article_type_id:
          $ref: '#/components/schemas/PositiveID'
        tag_ids:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/PositiveID'
        status:
          $ref: '#/components/schemas/ArticleStatus'
        support:
          type: integer
          format: int64
          minimum: 0
        comment:
          type: integer
          format: int64
          minimum: 0
        visited:
          type: integer
          format: int64
          minimum: 0
        version:
          $ref: '#/components/schemas/Version'
        created_at:
          type: string
          format: date-time
          description: UTC timestamp.
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when present.
    ArticleCreate:
      type: object
      additionalProperties: false
      required: [title, slug, digest, content, article_type_id, tag_ids, status]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          minLength: 1
          maxLength: 160
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        digest:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
          minLength: 1
        article_type_id:
          $ref: '#/components/schemas/PositiveID'
        tag_ids:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/PositiveID'
        status:
          $ref: '#/components/schemas/ArticleStatus'
    ArticlePatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          minLength: 1
          maxLength: 160
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        digest:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
          minLength: 1
        article_type_id:
          $ref: '#/components/schemas/PositiveID'
        tag_ids:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/PositiveID'
        status:
          $ref: '#/components/schemas/ArticleStatus'
    ArticleType:
      type: object
      additionalProperties: false
      required: [id, name, image, meun, version, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/PositiveID'
        name:
          type: string
          minLength: 1
          maxLength: 60
        image:
          type: string
          maxLength: 512
          nullable: true
        meun:
          type: integer
          format: int32
          minimum: 0
        version:
          $ref: '#/components/schemas/Version'
        created_at:
          type: string
          format: date-time
          description: UTC timestamp.
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when present.
    ArticleTypeCreate:
      type: object
      additionalProperties: false
      required: [name, meun]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        image:
          type: string
          maxLength: 512
          nullable: true
        meun:
          type: integer
          format: int32
          minimum: 0
    ArticleTypePatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        image:
          type: string
          maxLength: 512
          nullable: true
        meun:
          type: integer
          format: int32
          minimum: 0
    Tag:
      type: object
      additionalProperties: false
      required: [id, name, version, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/PositiveID'
        name:
          type: string
          minLength: 1
          maxLength: 60
        version:
          $ref: '#/components/schemas/Version'
        created_at:
          type: string
          format: date-time
          description: UTC timestamp.
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when present.
    TagCreate:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
    TagPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
    ArticleList:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        page:
          $ref: '#/components/schemas/PageInfo'
    ArticleTypeList:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ArticleType'
        page:
          $ref: '#/components/schemas/PageInfo'
    TagList:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        page:
          $ref: '#/components/schemas/PageInfo'
